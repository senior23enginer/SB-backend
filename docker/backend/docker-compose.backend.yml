services:
  oracle-free:
    image: container-registry.oracle.com/database/free:latest
    container_name: oracle-free
    ports:
      - "1521:1521"
      - "5500:5500"
    environment:
      ORACLE_PWD: Oracle123
    volumes:
      - oracle_data:/opt/oracle/oradata
    restart: unless-stopped

  backend:
    build:
      context: ..
      dockerfile: oracle/Dockerfile.backend
    container_name: interfaz-backend
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:oracle:thin:@//oracle-free:1521/FREEPDB1
      SPRING_DATASOURCE_JDBC_URL: jdbc:oracle:thin:@//oracle-free:1521/FREEPDB1
      SPRING_DATASOURCE_USERNAME: system
      SPRING_DATASOURCE_PASSWORD: Oracle123
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: oracle.jdbc.OracleDriver
    depends_on:
      - oracle-free
    restart: unless-stopped

volumes:
  oracle_data:
