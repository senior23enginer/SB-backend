services:
  oracle-free:
    image: container-registry.oracle.com/database/free:latest
    container_name: oracle-free
    ports:
      - "1521:1521"
      - "5500:5500"
    environment:
      ORACLE_PWD: Oracle123
    volumes:
      - oracle_data:/opt/oracle/oradata
      - ../oracle/sql.txt:/opt/oracle/scripts/setup/sql.txt:ro
      - ../oracle/sql-seek.txt:/opt/oracle/scripts/setup/sql-seek.txt:ro
      - ../oracle/01-schema.sql:/opt/oracle/scripts/setup/01-schema.sql:ro
      - ../oracle/02-seed.sql:/opt/oracle/scripts/setup/02-seed.sql:ro
      - ../oracle/03-verify.sql:/opt/oracle/scripts/setup/03-verify.sql:ro
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          echo "SELECT 1 FROM DUAL;" |
          sqlplus -s system/$${ORACLE_PWD}@//localhost:1521/FREEPDB1 | grep -q "1"
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 120s
    restart: unless-stopped

  backend:
    build:
      context: ../..
      dockerfile: docker/backend/Dockerfile.backend
    container_name: interfaz-backend
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:oracle:thin:@//oracle-free:1521/FREEPDB1
      SPRING_DATASOURCE_JDBC_URL: jdbc:oracle:thin:@//oracle-free:1521/FREEPDB1
      SPRING_DATASOURCE_USERNAME: system
      SPRING_DATASOURCE_PASSWORD: Oracle123
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: oracle.jdbc.OracleDriver
    depends_on:
      oracle-free:
        condition: service_healthy
    restart: unless-stopped

volumes:
  oracle_data:
