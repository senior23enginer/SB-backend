services:
  oracle-free:
    image: container-registry.oracle.com/database/free:latest
    container_name: oracle-free
    ports:
      - "1521:1521"
      - "5500:5500"
    environment:
      ORACLE_PWD: Oracle123
    volumes:
      - oracle_data:/opt/oracle/oradata
      - ./sql.txt:/opt/oracle/scripts/setup/sql.txt:ro
      - ./sql-seek.txt:/opt/oracle/scripts/setup/sql-seek.txt:ro
      - ./01-schema.sql:/opt/oracle/scripts/setup/01-schema.sql:ro
      - ./02-seed.sql:/opt/oracle/scripts/setup/02-seed.sql:ro
    restart: unless-stopped

volumes:
  oracle_data:
