spring.application.name=interfaz-backend

# ===============================
# Oracle DataSource
# ===============================
spring.datasource.url=jdbc:oracle:thin:@//localhost:1521/FREEPDB1
spring.datasource.jdbc-url=jdbc:oracle:thin:@//localhost:1521/FREEPDB1
spring.datasource.username=system
spring.datasource.password=Oracle123
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver

# ===============================
# HikariCP Pool - Oracle
# ===============================
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.pool-name=OracleHikariCP

# =====================================================
# JDBC TEMPLATE
# =====================================================
spring.jdbc.template.fetch-size=100
spring.jdbc.template.max-rows=500

# =====================================================
# LOGGING
# =====================================================
logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.jdbc.core=DEBUG
logging.level.org.springframework.jdbc.support=DEBUG
logging.level.org.springframework.security=DEBUG

# =====================================================
# SERVER ERROR DETAILS (DEV)
# =====================================================
server.error.include-message=always
server.error.include-binding-errors=always
server.error.include-stacktrace=always

# =====================================================
# SECURITY - PASSWORD POLICIES
# =====================================================
security.password.history-limit=25
security.password.max-age-days=30

# =====================================================
# SECURITY - SESSION MANAGEMENT
# =====================================================
security.sesion.max-active-sessions=1
security.sesion.inactivity-minutes=5
security.sesion.max-failed-attempts=5

# =====================================================
# PASSWORD EXPIRATION SCHEDULER
# =====================================================
security.password.expiration-cron=*/30 * * * * *
security.password.expiration-zone=America/Bogota

# =====================================================
# NO-LOGIN / ACCOUNT STATUS SCHEDULERS
# =====================================================
security.login.suspend-cron=0 0 0 * * *
security.login.suspend-days=30

security.login.inactivate-cron=0 10 0 * * *
security.login.inactivate-days=60
security.login.zone=America/Bogota

spring.main.lazy-initialization=true

# =====================================================
# OPENAPI / SWAGGER CONFIGURATION
# =====================================================
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.config-url=/v3/api-docs/swagger-config
springdoc.swagger-ui.urls[0].name=API - interfaz-backend
springdoc.swagger-ui.urls[0].url=/v3/api-docs

